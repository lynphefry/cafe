 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coffee shop</title>
    <link rel="stylesheet" href="assests\style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  

<nav class="navbar navbar-expand-lg navbar-dark bg-dark btn btn-primary">
    <div class="container d-flex justify-content-between">

    <a class="navbar-brand" href="#">☕ Urban Café</a>

    <div>
      <a class="nav-link d-inline text-white" href="index.html">Home</a>
      <a class="nav-link d-inline text-white" href="about.html">About</a>
      <a class="nav-link d-inline text-white" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<form id="contactForm" class="p-4 shadow">

  <!-- Name -->
  <div class="mb-3">

    <label for="name">Name</label>

    <input
      type="text"
      id="name"
      name="name"
      class="form-control"
      placeholder="Enter your name">

  </div>

  <!-- Email -->
  <div class="mb-3">

    <label for="email">Email</label>

    <input
      type="email"
      id="email"
      name="email"
      class="form-control"
      placeholder="Enter your email">

  </div>

  <!-- Message -->
  <div class="mb-3">

    <label for="message">Message</label>

    <textarea
      id="message"
      name="message"
      class="form-control"
      placeholder="Write your message">
    </textarea>

  </div>

  <button
    type="submit"
    class="btn btn-warning">

    Send Message

  </button>

</form>
</body>
</html>
